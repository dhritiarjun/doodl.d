<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lore — dhriti</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
    }

    body {
      background-color: #ff1f96;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 0;
    }

    .home-logo {
      display: block;
      line-height: 0;
    }

    .home-logo img {
      height: 90px;
      width: auto;
      display: block;
    }

    .site-nav nav {
      display: flex;
      gap: 32px;
    }

    .site-nav nav a {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 15px;
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 3px;
      letter-spacing: 0.01em;
    }

    .site-nav nav a.active {
      color: #ffde2d;
    }

    .site-nav nav a:hover {
      color: #ffde2d;
    }

    main {
      margin-top: 24px;
    }

    .content {
      padding: 40px 60px 100px;
    }

    .lore-heading {
      font-size: 74px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 32px;
    }

    .accordion {
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .accordion-item {
      background: #fff;
      border: 2px solid #000;
      border-radius: 16px;
      overflow: hidden;
    }

    .accordion-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 28px;
      background: #fff;
      border: none;
      font-family: inherit;
      font-size: 22px;
      font-weight: 600;
      text-align: left;
      color: #1400c8;
      cursor: pointer;
    }

    .accordion-item.open .accordion-header {
      background: #1400c8;
      color: #fff;
    }

    .accordion-arrow {
      display: inline-block;
      flex-shrink: 0;
      font-size: 14px;
      transition: transform 0.2s ease;
    }

    .accordion-item.open .accordion-arrow {
      transform: rotate(180deg);
    }

    .accordion-body {
      display: none;
      padding: 24px 28px;
      font-size: 16px;
      line-height: 1.65;
      color: #000;
    }

    .accordion-item.open .accordion-body {
      display: block;
    }

    .accordion-body .entry + .entry {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid #ddd;
    }

    .accordion-body .entry-title {
      color: #1400c8;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .accordion-body a {
      color: #1400c8;
      text-decoration: underline;
    }

    .retro-window {
      position: fixed;
      width: 380px;
      max-width: 90vw;
      background: #c0c0c0;
      border: 2px solid #000;
      box-shadow: 5px 5px 14px rgba(0,0,0,0.5);
      font-family: Arial, Helvetica, sans-serif;
      display: none;
      z-index: 1000;
    }

    .retro-titlebar {
      background: #0000aa;
      color: #fff;
      font-weight: bold;
      font-size: 15px;
      padding: 5px 6px 5px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: move;
      user-select: none;
    }

    .retro-close {
      width: 20px;
      height: 20px;
      background: #c0c0c0;
      border: 2px outset #d4d0c8;
      color: #000;
      font-weight: bold;
      font-size: 13px;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .retro-close:active { border-style: inset; }

    .retro-body {
      padding: 34px 24px;
      min-height: 90px;
      color: #000;
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
    }

    .retro-body a { color: #0000ee; text-decoration: underline; }
    .retro-body div + div { margin-top: 6px; }
  </style>
</head>
<body>

  <div class="site-nav">
    <a href="index.html" class="home-logo" aria-label="dhriti arjun home">
      <img src="doodld.gif" alt="doodl.d">
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="#" id="nav-contact">Contact</a>
    </nav>
  </div>

  <main>
    <div class="content">
      <div class="lore-heading">lore</div>
      <div class="accordion" id="lore-accordion"></div>
    </div>
  </main>

  <div class="retro-window" id="contact-window">
    <div class="retro-titlebar">
      <span>dhriti says</span>
      <button class="retro-close" type="button" data-close="contact-window" aria-label="Close">✕</button>
    </div>
    <div class="retro-body">
      <div><a href="mailto:dhriti.arjun@gmail.com">dhriti.arjun@gmail.com</a></div>
      <div><a href="https://www.linkedin.com/in/dhritiarjun" target="_blank" rel="noopener">linkedin</a></div>
      <div><a href="https://www.instagram.com/dhritiarjun/" target="_blank" rel="noopener">@dhritiarjun</a></div>
    </div>
  </div>

  <script>
    const LORE_ITEMS = [
      {
        title: 'bachelor thesis',
        entries: [
          {
            body: 'grade received: 9 (90%)<br><br>the thesis aims to assess and evaluate existing machine learning methods such as sentiment analysis and image-based forecasting in fashion trend predictions. the end goal is to generate a novel ml model for better trend prediction in fashion retailing.<br><br>approaches used: fashion trend forecasting systems using techniques like r-cnns, logistic regression, multivariate attention fusion in addition to other techniques. natural language processing (nlp) for social media sentiment analysis. image classification and analysis using unsupervised object detection and fashion image segmentation and labelling.'
          }
        ]
      },
      {
        title: 'coursework',
        entries: [
          {
            title: 'big data (2022):',
            body: 'used python, jupyter notebook, dask, pandas, matplotlib and plotly to visualise and analyse kickstarter data scrapes. see final project here.'
          },
          {
            title: 'programming in python (2022):',
            body: 'arcade style shooting game using object oriented programming. see final project here.'
          }
        ]
      },
      {
        title: 'leadership',
        entries: [
          {
            title: 'music:',
            body: 'i led a team in collaboration with the un office of drugs and crime to combat misinformation and cybercrime in the pandemic. i did the website design and promotional content, and performed a series of 7 promotional solo concerts, reaching 5000+ views. i have been formally trained for over 8 years in western vocals and piano, and performed 45+ solo live music concerts for over a month with 10000+ views on instagram.'
          },
          {
            title: 'art:',
            body: 'chiaroscuro art festival, india (2019&ndash;2021). i was the visual arts team leader for a country-wide arts festival attended by over 25 premier schools in the country with over 100 contributing artists. i managed a team of 10+ members, and designed all the visuals, themes and social media content.'
          }
        ]
      },
      {
        title: 'social initiatives',
        entries: [
          {
            title: 'founder: postcolonial perspectives book club (september 2023 &ndash; july 2024)',
            body: 'i founded a university book club focused on decolonising our reading habits in collaboration with the literature professor at our university. we organised over 30 events discussing seminal work in postcolonial literature and theoretical work, moderated and presented weekly by me.'
          },
          {
            title: 'events committee board member: groningen feminist network (february 2023 &ndash; may 2024)',
            body: 'we organised weekly educational, social and collaborative events promoting the feminist space in groningen, netherlands. as a board member, i managed the events end to end with a team of four where i designed the social media content, organised the space, and moderated discussions. we additionally planned collaborative events with other activist groups such as events and parades hosting 300+ attendees.'
          }
        ]
      }
    ];

    const accordion = document.getElementById('lore-accordion');

    LORE_ITEMS.forEach(function (item) {
      const row = document.createElement('div');
      row.className = 'accordion-item';

      const header = document.createElement('button');
      header.className = 'accordion-header';
      header.type = 'button';
      header.innerHTML =
        '<span>' + item.title + '</span>' +
        '<span class="accordion-arrow">&#9660;</span>';

      const body = document.createElement('div');
      body.className = 'accordion-body';
      body.innerHTML = item.entries.map(function (entry) {
        const titleHtml = entry.title ? '<div class="entry-title">' + entry.title + '</div>' : '';
        return '<div class="entry">' + titleHtml + '<div>' + entry.body + '</div></div>';
      }).join('');

      header.addEventListener('click', function () {
        row.classList.toggle('open');
      });

      row.appendChild(header);
      row.appendChild(body);
      accordion.appendChild(row);
    });

    (function () {
      let topZ = 1000;
      function bringToFront(win) { topZ++; win.style.zIndex = String(topZ); }
      function openWindow(id) {
        const win = document.getElementById(id);
        if (!win) return;
        win.style.display = 'block';
        win.style.left = Math.max(0, (window.innerWidth - win.offsetWidth) / 2) + 'px';
        win.style.top = Math.max(0, (window.innerHeight - win.offsetHeight) / 2 - 20) + 'px';
        bringToFront(win);
      }
      function closeWindow(id) { const win = document.getElementById(id); if (win) win.style.display = 'none'; }
      function makeDraggable(win) {
        const handle = win.querySelector('.retro-titlebar');
        let dragging = false, offsetX = 0, offsetY = 0;
        handle.addEventListener('mousedown', function (e) {
          if (e.target.closest('.retro-close')) return;
          dragging = true; bringToFront(win);
          const r = win.getBoundingClientRect(); offsetX = e.clientX - r.left; offsetY = e.clientY - r.top;
          e.preventDefault();
        });
        window.addEventListener('mousemove', function (e) { if (!dragging) return; win.style.left = (e.clientX - offsetX) + 'px'; win.style.top = (e.clientY - offsetY) + 'px'; });
        window.addEventListener('mouseup', function () { dragging = false; });
        win.addEventListener('mousedown', function () { bringToFront(win); });
      }
      document.querySelectorAll('.retro-window').forEach(makeDraggable);
      document.querySelectorAll('[data-close]').forEach(function (btn) { btn.addEventListener('click', function () { closeWindow(btn.getAttribute('data-close')); }); });
      const contactLink = document.getElementById('nav-contact');
      if (contactLink) { contactLink.addEventListener('click', function (e) { e.preventDefault(); openWindow('contact-window'); }); }
    })();
  </script>

</body>
</html>
