<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>work — dhriti</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
    }

    body {
      background-color: #ff1f96;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 0;
    }

    .home-logo {
      display: block;
      line-height: 0;
    }

    .home-logo img {
      height: 90px;
      width: auto;
      display: block;
    }

    .site-nav nav {
      display: flex;
      gap: 36px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 28px;
      border-radius: 999px;
    }

    .site-nav nav a {
      position: relative;
      display: inline-block;
      overflow: hidden;
      height: 1.1em;
      line-height: 1.1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .site-nav nav a .roll {
      display: block;
      transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .site-nav nav a .roll span {
      display: block;
      height: 1.1em;
      line-height: 1.1;
    }

    .site-nav nav a .roll span:last-child {
      color: #ffde2d;
    }

    .site-nav nav a.active .roll span:first-child {
      color: #ffde2d;
    }

    .site-nav nav a:hover .roll {
      transform: translateY(-1.1em);
    }

    main {
      margin-top: 24px;
    }

    .content {
      padding: 40px 60px 100px;
    }

    .work-heading {
      font-size: 74px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 32px;
    }

    .work-layout {
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }

    .accordion {
      flex: 1;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .side-panel {
      flex-shrink: 0;
      width: 480px;
      background: #fff;
      border: 2px solid #000;
      border-radius: 16px;
      padding: 24px 28px;
      font-size: 15px;
      line-height: 1.65;
      color: #000;
    }

    .side-section + .side-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #ddd;
    }

    .side-section-title {
      font-size: 18px;
      font-weight: 700;
      color: #1400c8;
      margin-bottom: 14px;
    }

    .side-skill-group {
      margin-bottom: 12px;
    }

    .side-skill-group:last-child {
      margin-bottom: 0;
    }

    .side-skill-label {
      font-weight: 700;
      color: #1400c8;
      margin-bottom: 2px;
    }

    .accordion-item {
      background: #fff;
      border: 2px solid #000;
      border-radius: 16px;
      overflow: hidden;
    }

    .accordion-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 28px;
      background: #fff;
      border: none;
      font-family: inherit;
      font-size: 22px;
      font-weight: 600;
      text-align: left;
      color: #1400c8;
      cursor: pointer;
    }

    .accordion-item.open .accordion-header {
      background: #1400c8;
      color: #fff;
    }

    .accordion-arrow {
      display: inline-block;
      flex-shrink: 0;
      font-size: 14px;
      transition: transform 0.2s ease;
    }

    .accordion-item.open .accordion-arrow {
      transform: rotate(180deg);
    }

    .accordion-body {
      display: none;
      padding: 24px 28px;
      font-size: 16px;
      line-height: 1.65;
      color: #000;
    }

    .accordion-item.open .accordion-body {
      display: block;
    }

    .accordion-body .entry + .entry {
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid #ddd;
    }

    .accordion-body .entry-title {
      color: #1400c8;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .accordion-body a {
      color: #1400c8;
      text-decoration: underline;
    }

    .retro-window {
      position: fixed;
      width: 380px;
      max-width: 90vw;
      background: #c0c0c0;
      border: 2px solid #000;
      box-shadow: 5px 5px 14px rgba(0,0,0,0.5);
      font-family: Arial, Helvetica, sans-serif;
      display: none;
      z-index: 1000;
    }

    .retro-titlebar {
      background: #0000aa;
      color: #fff;
      font-weight: bold;
      font-size: 15px;
      padding: 5px 6px 5px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: move;
      user-select: none;
    }

    .retro-close {
      width: 20px;
      height: 20px;
      background: #c0c0c0;
      border: 2px outset #d4d0c8;
      color: #000;
      font-weight: bold;
      font-size: 13px;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .retro-close:active { border-style: inset; }

    .retro-body {
      padding: 34px 24px;
      min-height: 90px;
      color: #000;
      font-size: 14px;
      line-height: 1.7;
      text-align: left;
    }

    .retro-body a { color: #0000ee; text-decoration: underline; }
    .retro-body div + div { margin-top: 6px; }

    .type-cursor {
      display: inline-block;
      margin-left: 1px;
      color: #000;
      animation: type-cursor-blink 0.9s steps(1) infinite;
    }

    @keyframes type-cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @media (max-width: 900px) {
      .work-layout {
        flex-direction: column;
      }

      .accordion {
        max-width: 100%;
      }

      .side-panel {
        width: 100%;
      }
    }

    @media (max-width: 720px) {
      .site-nav {
        padding: 20px 20px 0;
        flex-wrap: wrap;
        gap: 14px;
      }

      .home-logo img {
        height: 64px;
      }

      .site-nav nav {
        gap: 16px;
        padding: 10px 18px;
      }

      .site-nav nav a {
        font-size: 11px;
        letter-spacing: 0.08em;
      }

      .content {
        padding: 28px 24px 70px;
      }

      .work-heading {
        font-size: clamp(40px, 12vw, 74px);
        margin-bottom: 24px;
      }

      .accordion-header {
        padding: 18px 20px;
        font-size: 18px;
      }

      .side-panel {
        padding: 20px 22px;
      }
    }
  </style>
</head>
<body>

  <div class="site-nav">
    <a href="index.html" class="home-logo" aria-label="dhriti arjun home">
      <img src="doodld.gif" alt="doodl.d">
    </a>
    <nav>
      <a href="index.html"><span class="roll"><span>Home</span><span aria-hidden="true">Home</span></span></a>
      <a href="about.html"><span class="roll"><span>About</span><span aria-hidden="true">About</span></span></a>
      <a href="work.html" class="active"><span class="roll"><span>Work</span><span aria-hidden="true">Work</span></span></a>
      <a href="#" id="nav-contact"><span class="roll"><span>Contact</span><span aria-hidden="true">Contact</span></span></a>
    </nav>
  </div>

  <main>
    <div class="content">
      <div class="work-heading">work</div>
      <div class="work-layout">
        <div class="accordion" id="work-accordion"></div>
      </div>
    </div>
  </main>

  <div class="retro-window" id="contact-window">
    <div class="retro-titlebar">
      <span>dhriti says</span>
      <button class="retro-close" type="button" data-close="contact-window" aria-label="Close">✕</button>
    </div>
    <div class="retro-body">
      <div id="contact-intro"><span data-part="pre"></span><a href="about.html" data-part="link"></a><span data-part="post"></span><span class="type-cursor">&#9614;</span></div>
      <div><a href="mailto:dhriti.arjun@gmail.com">dhriti.arjun@gmail.com</a></div>
      <div><a href="https://www.linkedin.com/in/dhritiarjun" target="_blank" rel="noopener">linkedin</a></div>
      <div><a href="https://www.instagram.com/dhritiarjun/" target="_blank" rel="noopener">@dhritiarjun</a></div>
    </div>
  </div>

  <script>
    // Left empty for now — populate with work entries later, same shape as lore.html's items.
    const WORK_ITEMS = [];

    const accordion = document.getElementById('work-accordion');

    WORK_ITEMS.forEach(function (item) {
      const row = document.createElement('div');
      row.className = 'accordion-item';

      const header = document.createElement('button');
      header.className = 'accordion-header';
      header.type = 'button';
      header.innerHTML =
        '<span>' + item.title + '</span>' +
        '<span class="accordion-arrow">&#9660;</span>';

      const body = document.createElement('div');
      body.className = 'accordion-body';
      body.innerHTML = item.entries.map(function (entry) {
        const titleHtml = entry.title ? '<div class="entry-title">' + entry.title + '</div>' : '';
        return '<div class="entry">' + titleHtml + '<div>' + entry.body + '</div></div>';
      }).join('');

      header.addEventListener('click', function () {
        row.classList.toggle('open');
      });

      row.appendChild(header);
      row.appendChild(body);
      accordion.appendChild(row);
    });

    (function () {
      let topZ = 1000;
      function bringToFront(win) { topZ++; win.style.zIndex = String(topZ); }
      function openWindow(id) {
        const win = document.getElementById(id);
        if (!win) return;
        win.style.display = 'block';
        win.style.left = Math.max(0, (window.innerWidth - win.offsetWidth) / 2) + 'px';
        win.style.top = Math.max(0, (window.innerHeight - win.offsetHeight) / 2 - 20) + 'px';
        bringToFront(win);
        if (id === 'contact-window') startContactTypewriter();
      }

      // Retro video-game style typewriter effect for the contact intro line
      // (ported from reactbits.dev's TextType component)
      let typewriterRun = 0;
      function startContactTypewriter() {
        const container = document.getElementById('contact-intro');
        if (!container) return;

        const MIN_SPEED = 10;
        const MAX_SPEED = 40;

        const pre = container.querySelector('[data-part="pre"]');
        const link = container.querySelector('[data-part="link"]');
        const post = container.querySelector('[data-part="post"]');

        const PRE_TEXT = 'hi, i’m dhriti arjun, part musician and artist, part data scientist. i like to use data and technology to explore what it means to be human in the age of ai. learn more about me ';
        const LINK_TEXT = 'here';
        const POST_TEXT = '.';

        pre.textContent = '';
        link.textContent = '';
        post.textContent = '';

        const queue = [];
        for (const ch of PRE_TEXT) queue.push([pre, ch]);
        for (const ch of LINK_TEXT) queue.push([link, ch]);
        for (const ch of POST_TEXT) queue.push([post, ch]);

        const runId = ++typewriterRun;
        let i = 0;

        function step() {
          if (runId !== typewriterRun) return;
          if (i >= queue.length) return;
          const [el, ch] = queue[i++];
          el.textContent += ch;
          const delay = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED);
          setTimeout(step, delay);
        }

        step();
      }

      function closeWindow(id) { const win = document.getElementById(id); if (win) win.style.display = 'none'; }
      function makeDraggable(win) {
        const handle = win.querySelector('.retro-titlebar');
        let dragging = false, offsetX = 0, offsetY = 0;
        handle.addEventListener('mousedown', function (e) {
          if (e.target.closest('.retro-close')) return;
          dragging = true; bringToFront(win);
          const r = win.getBoundingClientRect(); offsetX = e.clientX - r.left; offsetY = e.clientY - r.top;
          e.preventDefault();
        });
        window.addEventListener('mousemove', function (e) { if (!dragging) return; win.style.left = (e.clientX - offsetX) + 'px'; win.style.top = (e.clientY - offsetY) + 'px'; });
        window.addEventListener('mouseup', function () { dragging = false; });
        win.addEventListener('mousedown', function () { bringToFront(win); });
      }
      document.querySelectorAll('.retro-window').forEach(makeDraggable);
      document.querySelectorAll('[data-close]').forEach(function (btn) { btn.addEventListener('click', function () { closeWindow(btn.getAttribute('data-close')); }); });
      const contactLink = document.getElementById('nav-contact');
      if (contactLink) { contactLink.addEventListener('click', function (e) { e.preventDefault(); openWindow('contact-window'); }); }
    })();
  </script>

</body>
</html>
